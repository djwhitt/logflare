site_name: Logflare Architecture
site_url: https://djwhitt.github.io/logflare/
repo_url: https://github.com/djwhitt/logflare
edit_uri: edit/djwhitt/main/docs/

docs_dir: docs

exclude_docs: |
  /docs.logflare.com/
  *.mmd

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Overview: index.md
  - Ingestion:
      - ingestion/index.md
      - Log Event Processing: ingestion/log-events.md
  - Pipelines:
      - pipelines/index.md
      - Broadway Pipelines: pipelines/broadway.md
      - Dynamic Pipeline Scaling: pipelines/scaling.md
      - Backpressure: pipelines/backpressure.md
  - Runtime:
      - runtime/index.md
      - Caching: runtime/caching.md
      - Rust NIFs: runtime/rust-nifs.md
  - Query:
      - query/index.md
      - Alerting: query/alerting.md
  - Operations:
      - operations/index.md
      - Web Layer: operations/web.md
      - Deployment Modes: operations/deployment.md
      - Key Dependencies: operations/dependencies.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
