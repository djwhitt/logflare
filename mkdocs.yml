site_name: Logflare Architecture
site_url: https://djwhitt.github.io/logflare/
repo_url: https://github.com/djwhitt/logflare
edit_uri: edit/djwhitt/main/docs/

docs_dir: docs

exclude_docs: |
  /docs.logflare.com/
  *.mmd

theme:
  name: material
  features:
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Architecture: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
