[tools]
python = "3.12"
"pipx:mkdocs" = { version = "latest", pipx_args = "--preinstall mkdocs-material" }

[tasks.sync-upstream]
description = "Add upstream remote if missing, fetch it, and rebase current branch onto upstream/main"
run = """
if ! git remote get-url upstream >/dev/null 2>&1; then
  git remote add upstream git@github.com:Logflare/logflare.git
fi
git fetch upstream
git rebase upstream/main
"""

[tasks."docs:serve"]
description = "Run MkDocs dev server at http://127.0.0.1:8000"
run = "mkdocs serve"

[tasks."docs:build"]
description = "Build static docs site to ./site/"
run = "mkdocs build"
